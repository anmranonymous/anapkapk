<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>anapkapk.com</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #0d0d0d);
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #00ffcc;
}

.logo {
    font-size: 22px;
    color: #00ffcc;
    font-weight: bold;
    text-shadow: 0 0 10px #00ffcc;
}

.menu a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    color: #00ffcc;
}

/* Hero */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 42px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
}

.hero p {
    margin-top: 10px;
    color: #aaa;
}

/* Search */
.search-box input {
    padding: 12px;
    width: 260px;
    border-radius: 30px;
    border: none;
    outline: none;
    margin-top: 20px;
}

/* Container */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: 0.4s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 25px #00ffcc;
}

.card img {
    width: 100%;
    border-radius: 15px;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: linear-gradient(45deg, #00ffcc, #00cc99);
    color: black;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* Ads */
.ads {
    margin: 20px;
    padding: 20px;
    text-align: center;
    border: 1px dashed #00ffcc;
    border-radius: 15px;
    background: rgba(0,0,0,0.3);
}

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>
