<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>anapkapk.com - APK Downloader</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif;}
body { background:#f9f9f9; color:#333; }
a { text-decoration:none; color:inherit; }

/* Navbar */
.navbar { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1a73e8; color:#fff; }
.navbar .logo { font-size:24px; font-weight:700; }
.navbar .menu a { margin-left:20px; color:#fff; font-weight:500; }

/* Hero Section */
.hero { text-align:center; padding:80px 20px; background:#e8f0fe; }
.hero h1 { font-size:36px; margin-bottom:10px; }
.hero p { font-size:18px; margin-bottom:20px; color:#555; }
.search-box input { padding:10px 15px; width:300px; border:1px solid #ccc; border-radius:5px; }

/* Container for apps */
.container { display:flex; flex-wrap:wrap; justify-content:center; padding:40px 20px; gap:20px; }
.card { background:#fff; padding:20px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); width:200px; text-align:center; transition:transform 0.3s; }
.card:hover { transform:translateY(-5px); }
.card img { width:100%; border-radius:10px; margin-bottom:15px; }
.card h3 { font-size:18px; margin-bottom:5px; }
.card p { font-size:14px; color:#777; margin-bottom:10px; }
.btn { display:inline-block; padding:8px 15px; background:#1a73e8; color:#fff; border-radius:5px; font-weight:500; }

/* Ads */
.ads { text-align:center; padding:20px; background:#fff; margin:20px auto; width:90%; border:1px dashed #ccc; color:#777; }

/* Footer */
.footer { text-align:center; padding:20px; background:#1a73e8; color:#fff; margin-top:40px; }

/* Responsive */
@media(max-width:768px){
    .navbar { flex-direction:column; gap:10px; }
    .search-box input { width:90%; }
    .container { flex-direction:column; align-items:center; }
}
</style>
</head>

<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">anapkapk.com</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Apps</a>
            <a href="#">Games</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Download Best APK Apps</h1>
        <p>Safe & Fast Android Apps Download</p>
        <div class="search-box">
            <input type="text" placeholder="Search apps..." id="searchInput" onkeyup="searchApps()">
        </div>
    </div>

    <!-- APK Cards -->
    <div class="container" id="appContainer">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="App">
            <h3>Sample App</h3>
            <p>Best Android App</p>
            <a href="apk/sample-app.apk" class="btn" download>Download</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Game">
            <h3>Cool Game</h3>
            <p>Fun Android Game</p>
            <a href="apk/cool-game.apk" class="btn" download>Download</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="App">
            <h3>Music App</h3>
            <p>Listen & Enjoy Music</p>
            <a href="apk/music-app.apk" class="btn" download>Download</a>
        </div>
    </div>

    <!-- Ads -->
    <div class="ads">Your Ads Here</div>

    <!-- Footer -->
    <div class="footer">
        © 2026 anapkapk.com | All Rights Reserved
    </div>

<script>
// Simple search function
function searchApps() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let cards = document.getElementById('appContainer').getElementsByClassName('card');

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
        if (title.includes(input)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
