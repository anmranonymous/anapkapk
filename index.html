<!DOCTYPE html>
<html>
<head>
<title>anapkapk.com</title>
<style>
body {
    background: #0d0d0d;
    color: white;
    font-family: Arial;
    margin: 0;
}

.navbar {
    text-align: center;
    padding: 15px;
    font-size: 24px;
    color: #00ffcc;
    box-shadow: 0 0 10px #00ffcc;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffcc;
}

img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
🔥 anapkapk.com 🔥
</div>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Sample App</h3>
<p>Best App for Android</p>
<a class="btn" href="#">Download</a>
</div>

</div>

</body>
</html>
