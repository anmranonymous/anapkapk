<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>anapkapk.com</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
    box-shadow: 0 0 10px #00ffcc;
}

.logo {
    font-size: 22px;
    color: #00ffcc;
    font-weight: bold;
}

.menu a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* Hero */
.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 40px;
    color: #00ffcc;
}

.hero p {
    margin-top: 10px;
    color: #ccc;
}

/* Search */
.search-box {
    margin-top: 20px;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 20px;
    border: none;
}

/* Container */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

/* Card */
.card {
    background: #1c1c1c;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 10px #000;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #00ffcc;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: #00ffcc;
    color: black;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #00cc99;
}

/* Ads */
.ads {
    margin: 20px;
    padding: 20px;
    text-align: center;
    border: 1px dashed #444;
    border-radius: 10px;
}

/* Footer */
.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">🔥 anapkapk.com</div>
    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Apps</a>
        <a href="#">Games</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Download Best APK Apps</h1>
    <p>Safe & Fast Android Apps Download</p>

    <div class="search-box">
        <input type="text" placeholder="Search apps...">
    </div>
</div>

<!-- Ads -->
<div class="ads">
    Your Ads Here
</div>

<!-- Apps -->
<div class="container">

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Sample App</h3>
    <p>Best Android App</p>
    <a class="btn" href="#">Download</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Cool Game</h3>
    <p>Fun Android Game</p>
    <a class="btn" href="#">Download</a>
</div>

</div>

<!-- Ads -->
<div class="ads">
    Your Ads Here
</div>

<!-- Footer -->
<div class="footer">
    © 2026 anapkapk.com | All Rights Reserved
</div>

</body>
</html>
